name: Build APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

defaults:
  run:
    working-directory: android

jobs:
  build:
    name: Assemble debug
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Rendi eseguibile il wrapper Gradle
        run: chmod +x gradlew

      - name: Unit test
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  # APK release FIRMATO: parte sui tag v* (e allega l'APK alla release GitHub)
  # oppure a mano via workflow_dispatch (solo artifact, per verificare la firma).
  release:
    name: Assemble release firmato
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Rendi eseguibile il wrapper Gradle
        run: chmod +x gradlew

      - name: Unit test
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Ripristina il keystore dai secret
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore.p12"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release APK firmato
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/keystore.p12
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verifica firma
        run: |
          APK=$(ls app/build/outputs/apk/release/*.apk)
          BT=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BT/apksigner" verify --print-certs "$APK"

      - name: Upload APK firmato (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Allega APK alla release del tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release upload "$GITHUB_REF_NAME" app/build/outputs/apk/release/*.apk --clobber --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}
